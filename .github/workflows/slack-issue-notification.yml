name: Slack Issue Notification

on:
  issues:
    types: [opened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build Slack payload
        id: payload
        run: |
          if [ "${{ github.event.action }}" = "opened" ]; then
            COLOR="#36a64f"
            STATUS="🆕 Issue Opened"
          else
            COLOR="#d9534f"
            STATUS="✅ Issue Closed"
          fi

          echo "color=$COLOR" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.payload.outputs.color }}",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*${{ steps.payload.outputs.status }}*: <${{ github.event.issue.html_url }}|#${{ github.event.issue.number }} ${{ github.event.issue.title }}>"
                      }
                    },
                    {
                      "type": "context",
                      "elements": [
                        {
                          "type": "mrkdwn",
                          "text": "*Repo:* ${{ github.repository }} | *By:* ${{ github.event.issue.user.login }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
